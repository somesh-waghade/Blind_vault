<!DOCTYPE html>
<html>
<head>
    <title>BlindVault</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
        }
        h1 {
            color: #333;
            font-size: 1.5em;
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 10px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>
    <h1>BlindVault 🛡️</h1>
    <div class="container">
        <button id="unlock">Unlock Vault</button>
        <button id="settings">Settings</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
