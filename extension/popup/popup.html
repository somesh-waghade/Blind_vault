<!DOCTYPE html>
<html>
<head>
    <title>BlindVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="toast-container"></div>
    <div class="header">
        <h1>BlindVault 🛡️</h1>
        <p id="status-msg">Securely store your passwords</p>
    </div>

    <!-- Auth View -->
    <div id="auth-view" class="container">
        <div class="tabs">
            <button id="tab-login" class="active">Login</button>
            <button id="tab-register">Register</button>
        </div>

        <div class="form-group">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Master Password">
        </div>

        <button id="auth-btn">Log In</button>
        <p class="hint" id="auth-hint">Enter your master password to unlock.</p>
    </div>

    <!-- Vault View (Hidden by default) -->
    <div id="vault-view" class="container hidden">
        <div class="vault-header">
            <h3>Your Vault</h3>
            <button id="lock-btn">Lock</button>
        </div>
        <div class="search-box">
            <input type="text" id="vault-search" placeholder="Search websites...">
        </div>
        <div id="credentials-list">
            <!-- Items injected here -->
            <p class="empty-msg">No credentials stored yet.</p>
        </div>
        <button id="add-btn">+ Add Password</button>
    </div>

    <script src="../scripts/crypto.js"></script>
    <script src="popup.js"></script>
</body>
</html>
