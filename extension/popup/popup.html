<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BlindVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="toast-container"></div>
    <div class="header">
        <div class="nav-icons">
            <button id="nav-vault" class="active" title="Vault">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </button>
            <button id="nav-settings" title="Settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
        <h1>BlindVault</h1>
        <p id="status-msg">Securely store your passwords</p>
    </div>

    <!-- Auth View -->
    <div id="auth-view" class="container">
        <div class="tabs">
            <button id="tab-login" class="active">Login</button>
            <button id="tab-register">Register</button>
        </div>

        <div class="form-group">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Master Password">
        </div>

        <button id="auth-btn">Log In</button>
        <p class="hint" id="auth-hint">Enter your master password to unlock.</p>
    </div>

    <!-- Vault View (Hidden by default) -->
    <div id="vault-view" class="container hidden">
        <div class="vault-header">
            <h3>Your Vault</h3>
            <button id="lock-btn">Lock</button>
        </div>
        <div class="search-box">
            <input type="text" id="vault-search" placeholder="Search websites...">
        </div>
        <div id="credentials-list">
            <!-- Items injected here -->
            <p class="empty-msg">No credentials stored yet.</p>
        </div>
        <button id="add-btn">+ Add Password</button>
    </div>

    <!-- Settings View (Hidden by default) -->
    <div id="settings-view" class="container hidden">
        <div class="settings-section">
            <h4>Profile</h4>
            <div class="profile-card">
                <div class="profile-info">
                    <div class="profile-avatar">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div class="profile-details">
                        <span class="label">Username</span>
                        <span id="profile-username" class="value">Not Logged In</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <h4>Preferences</h4>
            <div class="setting-item">
                <label for="auto-lock">Auto-lock (minutes)</label>
                <select id="auto-lock-timer">
                    <option value="5">5 minutes</option>
                    <option value="15">15 minutes</option>
                    <option value="30" selected>30 minutes</option>
                    <option value="60">1 hour</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Theme</label>
                <div class="theme-toggle">
                    <button class="active">Light</button>
                    <button disabled title="Coming soon">Dark</button>
                </div>
            </div>
        </div>

        <button id="logout-btn" class="danger-btn">Log Out & Wipe Key</button>
    </div>

    <script src="../scripts/circomlibjs.min.js"></script>
    <script src="../scripts/snarkjs.min.js"></script>
    <script src="../scripts/crypto.js"></script>
    <script src="popup.js"></script>
</body>
</html>
